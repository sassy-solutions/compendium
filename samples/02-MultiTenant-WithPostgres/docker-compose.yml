services:
  postgres:
    image: postgres:16-alpine
    container_name: compendium-sample-pg
    environment:
      POSTGRES_DB: compendium_sample
      POSTGRES_USER: compendium
      POSTGRES_PASSWORD: compendium
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compendium -d compendium_sample"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - compendium-sample-pg:/var/lib/postgresql/data

volumes:
  compendium-sample-pg:
