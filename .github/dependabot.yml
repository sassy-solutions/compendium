version: 2
updates:
  # NuGet dependencies — grouped weekly
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    reviewers:
      - "Pomdapis"
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
          - "Microsoft.AspNetCore.*"
      serilog:
        patterns:
          - "Serilog*"
      opentelemetry:
        patterns:
          - "OpenTelemetry*"
      xunit:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
      testcontainers:
        patterns:
          - "Testcontainers*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    reviewers:
      - "Pomdapis"
