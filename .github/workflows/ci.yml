name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # MinVer needs full history

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Compendium.sln

      - name: Build
        run: dotnet build Compendium.sln -c Release --no-restore

      - name: Test (unit only)
        run: |
          dotnet test Compendium.sln -c Release --no-build \
            --filter "FullyQualifiedName!~IntegrationTests&FullyQualifiedName!~LoadTests" \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory TestResults/ \
            --collect:"XPlat Code Coverage"

      - name: Build samples
        run: dotnet build samples/ -c Release

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/
          retention-days: 14
